name: deploy github pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.108 --locked

      - name: build web wasm
        run: ./scripts/build_web.sh

      - name: bundle optional model assets
        run: ./scripts/bundle_web_assets.sh

      - name: stage site
        run: |
          rm -rf site
          mkdir -p site/out
          cp www/index.html site/index.html
          # deploy service worker to root scope for root pages
          cp www/burn_gaussian_splatting_sw.js site/burn_gaussian_splatting_sw.js
          cp -r www/out/. site/out/
          if [ -d "www/assets" ]; then
            mkdir -p site/assets
            cp -r www/assets/. site/assets/
          fi
          test -f site/index.html
          test -f site/out/burn_gaussian_splatting_bg.wasm
          test -f site/burn_gaussian_splatting_sw.js

      - name: configure pages
        uses: actions/configure-pages@v5

      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: deploy to github pages
        id: deployment
        uses: actions/deploy-pages@v4
