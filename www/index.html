<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>bevy_reconstruction</title>
    <style>
      :root {
        --bg: #0a0f16;
        --fg: #e6eef9;
        --muted: #9bb1cc;
        --line: #32465f;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(circle at 20% 15%, #16304b 0%, transparent 30%),
          radial-gradient(circle at 85% 10%, #1f4343 0%, transparent 32%),
          var(--bg);
        color: var(--fg);
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }
      .shell {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 2000;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        background: rgba(12, 20, 30, 0.78);
        backdrop-filter: blur(4px);
        max-width: min(420px, calc(100vw - 24px));
        transition:
          opacity 220ms ease,
          transform 220ms ease;
      }
      .shell.hidden {
        opacity: 0;
        transform: translateY(-8px);
        pointer-events: none;
      }
      .shell.error {
        border-color: #8f3c3c;
        background: rgba(38, 15, 18, 0.86);
      }
      .shell p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }
      .shell .hint {
        margin-top: 6px;
        color: #7f95b1;
        font-size: 11px;
      }
      #status {
        margin-top: 6px;
        color: var(--fg);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="shell" id="bootstrap-shell">
      <p>bevy_reconstruction wasm</p>
      <p class="hint">try <code>?image=re10k/0.png&amp;image=re10k/1.png&amp;image=re10k/2.png</code></p>
      <div id="status">loading...</div>
    </div>

    <script type="module">
      const SW_VERSION = "v4";
      const shell = document.getElementById("bootstrap-shell");
      const status = document.getElementById("status");
      let hideShellTimer = null;

      const showShell = (error = false) => {
        shell.classList.remove("hidden");
        shell.classList.toggle("error", error);
      };

      const hideShellSoon = () => {
        if (hideShellTimer !== null) {
          clearTimeout(hideShellTimer);
        }
        hideShellTimer = setTimeout(() => {
          shell.classList.add("hidden");
          shell.classList.remove("error");
        }, 1400);
      };

      const setStatus = (msg) => {
        console.info(`[bevy_reconstruction] ${msg}`);
        status.textContent = msg;
      };

      const failStatus = (msg, err) => {
        if (err) {
          console.error(err);
        }
        showShell(true);
        setStatus(msg);
      };

      window.addEventListener("error", (event) => {
        failStatus(`runtime error: ${event.message}`, event.error ?? event.message);
      });
      window.addEventListener("unhandledrejection", (event) => {
        failStatus(`runtime rejection: ${String(event.reason)}`, event.reason);
      });

      const serviceWorkerCandidates = () => {
        const pageUrl = new URL(window.location.href);
        return [
          new URL(`burn_reconstruction_sw.js?sw=${SW_VERSION}`, pageUrl),
          new URL(`../burn_reconstruction_sw.js?sw=${SW_VERSION}`, pageUrl),
        ];
      };

      const ensureModelCacheServiceWorker = async () => {
        if (!("serviceWorker" in navigator)) {
          return false;
        }
        for (const candidate of serviceWorkerCandidates()) {
          try {
            const registration = await navigator.serviceWorker.register(candidate, {
              updateViaCache: "none",
            });
            await registration.update();
            await navigator.serviceWorker.ready;
            return true;
          } catch (_err) {
            // Try next candidate so both `/www/*` local hosting and deployed root paths work.
          }
        }
        return false;
      };

      const ensureWebGpuAdapter = async () => {
        const gpu = globalThis.navigator?.gpu;
        if (!gpu) {
          return {
            ok: false,
            reason:
              "WebGPU is unavailable in this browser. Use a WebGPU-enabled browser (Chrome/Edge) and secure context (https or localhost).",
          };
        }
        try {
          const adapter =
            (await gpu.requestAdapter({ powerPreference: "high-performance" })) ??
            (await gpu.requestAdapter());
          if (!adapter) {
            return {
              ok: false,
              reason:
                "No WebGPU adapter found. Check browser GPU settings/flags and graphics drivers.",
            };
          }
          return { ok: true };
        } catch (err) {
          return {
            ok: false,
            reason: `WebGPU adapter request failed: ${String(err)}`,
          };
        }
      };

      try {
        setStatus("initializing model cache...");
        await ensureModelCacheServiceWorker();
        setStatus("checking WebGPU...");
        const webGpu = await ensureWebGpuAdapter();
        if (!webGpu.ok) {
          failStatus(webGpu.reason);
          throw new Error(webGpu.reason);
        }
        setStatus("initializing wasm...");
        const mod = await import(`./out/bevy_reconstruction.js?v=${SW_VERSION}`);
        const wasm = await fetch(`./out/bevy_reconstruction_bg.wasm?v=${SW_VERSION}`);
        if (!wasm.ok) {
          throw new Error(`failed to fetch wasm: HTTP ${wasm.status}`);
        }
        await mod.default({ module_or_path: wasm });
        setStatus("running bevy app");
        hideShellSoon();
      } catch (err) {
        failStatus(`failed: ${String(err)}`, err);
      }
    </script>
  </body>
</html>
